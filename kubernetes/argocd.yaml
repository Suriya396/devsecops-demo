apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/suriya396/devsecops-demo.git'
    targetRevision: main
    path: kubernetes
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
